name: Keep Streamlit app awake

# Mantem https://usinai-ops.streamlit.app/ acordado no Streamlit Community Cloud.
# Roda a cada 4 horas (UTC) e tambem pode ser disparado manualmente na aba Actions.

on:
  schedule:
    - cron: '0 */4 * * *'   # a cada 4 horas (horario UTC)
  workflow_dispatch:

# Necessario para o passo de heartbeat conseguir commitar/push.
permissions:
  contents: write

# Evita execucoes sobrepostas.
concurrency:
  group: keep-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright (Chromium)
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Visit app and wake it if asleep
        env:
          APP_URL: https://usinai-ops.streamlit.app/
        run: python .github/scripts/keep_awake.py

      # Proteção anti-desativacao: o GitHub desativa workflows agendados apos
      # 60 dias SEM atividade no repo. Este passo grava um heartbeat e commita,
      # mas SO quando ja faz >= 20 dias do ultimo, para nao poluir o historico.
      - name: Heartbeat commit (mantem o cron ativo)
        run: |
          set -e
          HEARTBEAT=".github/keep-awake/heartbeat.txt"
          mkdir -p "$(dirname "$HEARTBEAT")"
          NOW=$(date -u +%s)
          THRESHOLD=$((20 * 24 * 3600))   # 20 dias em segundos

          NEED_COMMIT=1
          if [ -f "$HEARTBEAT" ]; then
            LAST=$(head -n1 "$HEARTBEAT" | grep -oE '^[0-9]+' || echo 0)
            if [ -n "$LAST" ] && [ "$LAST" -gt 0 ] && [ $((NOW - LAST)) -lt "$THRESHOLD" ]; then
              NEED_COMMIT=0
            fi
          fi

          if [ "$NEED_COMMIT" -eq 0 ]; then
            echo "Heartbeat ainda recente (< 20 dias); sem commit desta vez."
            exit 0
          fi

          printf '%s\n%s\n' "$NOW" "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > "$HEARTBEAT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$HEARTBEAT"
          if git diff --cached --quiet; then
            echo "Sem mudancas; nada a commitar."
            exit 0
          fi
          git commit -m "chore: heartbeat keep-awake [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
          echo "Heartbeat atualizado e commitado."
